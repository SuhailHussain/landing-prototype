<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Screen 1</title>
  <style>
    body { margin: 0; background: #eeeeee; }
    .canvas { width: 1440px; position: relative; margin: 0; }
    img { width: 1440px; height: auto; display: block; }
    .hotspot {
      position: absolute;
      left: 0; top: 0;
      background: transparent;
      opacity: 0;
      cursor: pointer;
      pointer-events: auto;
      z-index: 2;
      display: block;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <img src="./assets/images/dfe-parent.png" alt="Screen 1">

    <!-- EDIT these values (measured from the top-left of the image) -->
    <!-- Top ~300px hotspot to Screen 2 -->
    <a class="hotspot" href="./screen2.html" aria-label="Go to Screen 2"
       style="width:1440px; height:300px;"></a>
  </div>
</body>
</html>
